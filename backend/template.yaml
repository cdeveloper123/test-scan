AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  serverless-pdf-chat

  SAM Template for serverless-pdf-chat

Globals:
  Function:
    Runtime: python3.11
    Handler: main.lambda_handler
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        LOG_LEVEL: INFO
    Layers:
      - !Sub arn:aws:lambda:${AWS::Region}:017000801446:layer:AWSLambdaPowertoolsPythonV3-python311-arm64:7

Parameters:
  Frontend:
    Default: amplify
    Type: String
    AllowedValues:
      - local
      - amplify
  Repository:
    Type: String
  ModelId:
    Default: "anthropic.claude-3-sonnet-20240229-v1:0"
    Type: String
  EmbeddingModelId:
    Default: "amazon.titan-embed-text-v2:0"
    Type: String

Conditions:
  DeployToAmplifyHosting: !Equals
    - !Ref Frontend
    - amplify

Resources:
  DocumentBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - HEAD
              - POST
              - DELETE
            AllowedOrigins:
              - "*"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DocumentBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      PolicyDocument:
        Id: EnforceHttpsPolicy
        Version: "2012-10-17"
        Statement:
          - Sid: EnforceHttpsSid
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${DocumentBucket}/*"
              - !Sub "arn:aws:s3:::${DocumentBucket}"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
      Bucket: !Ref DocumentBucket

  EmbeddingQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      VisibilityTimeout: 180
      MessageRetentionPeriod: 3600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmbeddingDLQ.Arn
        maxReceiveCount: 3

  EmbeddingDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      MessageRetentionPeriod: 1209600

  EmbeddingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EmbeddingQueue
      PolicyDocument:
        Version: "2012-10-17"
        Id: SecureTransportPolicy
        Statement:
          - Sid: AllowSecureTransportOnly
            Effect: Deny
            Principal: "*"
            Action: "SQS:*"
            Resource: "*"
            Condition:
              Bool:
                aws:SecureTransport: false

  DocumentTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      KeySchema:
        - AttributeName: userid
          KeyType: HASH
        - AttributeName: documentid
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: userid
          AttributeType: S
        - AttributeName: documentid
          AttributeType: S
      BillingMode: PAY_PER_REQUEST

  MemoryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      KeySchema:
        - AttributeName: userid
          KeyType: HASH      
        - AttributeName: SessionId
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: userid
          AttributeType: S
        - AttributeName: SessionId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST

  # OpenSearch Serverless for vector store
  VectorCollectionEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-vector-encryption"
      Type: encryption
      Policy: '{"Rules":[{"ResourceType":"collection","Resource":["collection/pdfchat"]}],"AWSOwnedKey":true}'

  VectorCollectionNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-vector-network"
      Type: network
      Policy: '[{"Rules":[{"ResourceType":"collection","Resource":["collection/pdfchat"]},{"ResourceType":"dashboard","Resource":["collection/pdfchat"]}],"AllowFromPublic":true}]'

  VectorCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn: VectorCollectionEncryptionPolicy
    Properties:
      Name: pdfchat
      Type: VECTORSEARCH
      Description: Vector store for PDF document embeddings

  DocumentReadyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-document-ready"
      DisplayName: Document processing complete

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Ref CognitoUserPool
      GenerateSecret: false

  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'*'"
        AllowMethods: "'*'"

  GeneratePresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/generate_presigned_url/
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentBucket
      Environment:
        Variables:
          BUCKET: !Ref DocumentBucket
          REGION: !Sub ${AWS::Region}
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /generate_presigned_url
            Method: GET

  UploadTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/upload_trigger/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MemoryTable
        - S3ReadPolicy:
            BucketName: !Sub "${AWS::StackName}-${AWS::Region}-${AWS::AccountId}*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EmbeddingQueue.QueueName
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          MEMORY_TABLE: !Ref MemoryTable
          QUEUE: !GetAtt EmbeddingQueue.QueueName
          BUCKET: !Sub "${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref DocumentBucket
            Events:
              - s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .pdf

  GetDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get_document/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBReadPolicy:
            TableName: !Ref MemoryTable
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          MEMORY_TABLE: !Ref MemoryTable
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /doc/{documentid}/{conversationid}
            Method: GET

  GetAllDocuments:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get_all_documents/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentTable
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /doc
            Method: GET

  AddConversationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/add_conversation/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MemoryTable
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          MEMORY_TABLE: !Ref MemoryTable
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /doc/{documentid}
            Method: POST

  GenerateEmbeddingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/generate_embeddings/
      Timeout: 180
      MemorySize: 2048
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt EmbeddingQueue.QueueName
        - S3ReadPolicy:
            BucketName: !Ref DocumentBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - Statement:
            - Sid: "BedrockScopedAccess"
              Effect: "Allow"
              Action: "bedrock:InvokeModel"
              Resource: !Sub "arn:aws:bedrock:*::foundation-model/${EmbeddingModelId}"
            - Sid: "OpenSearchServerless"
              Effect: "Allow"
              Action: "aoss:APIAccessAll"
              Resource: !GetAtt VectorCollection.Arn
            - Sid: "SNSPublishDocumentReady"
              Effect: "Allow"
              Action: "sns:Publish"
              Resource: !Ref DocumentReadyTopic
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          BUCKET: !Ref DocumentBucket
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          OPENSEARCH_ENDPOINT: !GetAtt VectorCollection.CollectionEndpoint
          OPENSEARCH_INDEX: pdfchat
          DOCUMENT_READY_TOPIC_ARN: !Ref DocumentReadyTopic
          AWS_REGION: !Ref AWS::Region
      Events:
        EmbeddingQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EmbeddingQueue.Arn
            BatchSize: 1

  GenerateResponseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/generate_response/
      Timeout: 30
      MemorySize: 2048
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MemoryTable
        - Statement:
            - Sid: "BedrockScopedAccess"
              Effect: "Allow"
              Action: "bedrock:InvokeModel"
              Resource:
                - !Sub "arn:aws:bedrock:*::foundation-model/${ModelId}"
                - !Sub "arn:aws:bedrock:*::foundation-model/${EmbeddingModelId}"
            - Sid: "OpenSearchServerless"
              Effect: "Allow"
              Action: "aoss:APIAccessAll"
              Resource: !GetAtt VectorCollection.Arn
      Environment:
        Variables:
          MEMORY_TABLE: !Ref MemoryTable
          MODEL_ID: !Ref ModelId
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          OPENSEARCH_ENDPOINT: !GetAtt VectorCollection.CollectionEndpoint
          OPENSEARCH_INDEX: pdfchat
          AWS_REGION: !Ref AWS::Region
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{documentid}/{conversationid}
            Method: POST

  DeleteDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/delete_document/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MemoryTable
        - S3CrudPolicy:
            BucketName: !Ref DocumentBucket
        - Statement:
            - Sid: "OpenSearchServerless"
              Effect: "Allow"
              Action: "aoss:APIAccessAll"
              Resource: !GetAtt VectorCollection.Arn
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          MEMORY_TABLE: !Ref MemoryTable
          BUCKET: !Ref DocumentBucket
          OPENSEARCH_ENDPOINT: !GetAtt VectorCollection.CollectionEndpoint
          OPENSEARCH_INDEX: pdfchat
          AWS_REGION: !Ref AWS::Region
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /doc/{documentid}
            Method: DELETE

  SearchDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/search_documents/
      Timeout: 30
      MemorySize: 512
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentTable
        - Statement:
            - Sid: "OpenSearchServerless"
              Effect: "Allow"
              Action: "aoss:APIAccessAll"
              Resource: !GetAtt VectorCollection.Arn
            - Sid: "BedrockScopedAccess"
              Effect: "Allow"
              Action: "bedrock:InvokeModel"
              Resource: !Sub "arn:aws:bedrock:*::foundation-model/${EmbeddingModelId}"
      Environment:
        Variables:
          DOCUMENT_TABLE: !Ref DocumentTable
          OPENSEARCH_ENDPOINT: !GetAtt VectorCollection.CollectionEndpoint
          OPENSEARCH_INDEX: pdfchat
          EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
          AWS_REGION: !Ref AWS::Region
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /search
            Method: GET

  EmbeddingDLQHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/embedding_dlq_handler/
      Timeout: 60
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt EmbeddingDLQ.QueueName
        - Statement:
            - Sid: "SNSPublishAlerts"
              Effect: "Allow"
              Action: "sns:Publish"
              Resource: !Ref DocumentReadyTopic
      Environment:
        Variables:
          DOCUMENT_READY_TOPIC_ARN: !Ref DocumentReadyTopic
          AWS_REGION: !Ref AWS::Region
      Events:
        DLQEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EmbeddingDLQ.Arn
            BatchSize: 10

  VectorCollectionAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    DependsOn: [VectorCollection, GenerateEmbeddingsFunction, GenerateResponseFunction, DeleteDocumentFunction, SearchDocumentsFunction]
    Properties:
      Name: !Sub "${AWS::StackName}-vector-access"
      Type: data
      Policy: !Sub
        - '[{"Description":"Lambda access to vector collection","Rules":[{"ResourceType":"index","Resource":["index/pdfchat/*"],"Permission":["aoss:*"]},{"ResourceType":"collection","Resource":["collection/pdfchat"],"Permission":["aoss:*"]}],"Principal":["${GenEmbRole}","${GenResRole}","${DelDocRole}","${SearchRole}"]}]'
        - GenEmbRole: !Ref GenerateEmbeddingsFunctionRole
          GenResRole: !Ref GenerateResponseFunctionRole
          DelDocRole: !Ref DeleteDocumentFunctionRole
          SearchRole: !Ref SearchDocumentsFunctionRole

  AmplifyApp:
    Type: AWS::Amplify::App
    Condition: DeployToAmplifyHosting
    Properties:
      Name: !Sub "${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
      Repository: !Ref Repository
      BuildSpec: |
        version: 1
        applications:
          - frontend:
              phases:
                preBuild:
                  commands:
                    - npm ci
                build:
                  commands:
                    - npm run build
              artifacts:
                baseDirectory: dist
                files:
                  - '**/*'
              cache:
                paths:
                  - node_modules/**/*
            appRoot: frontend
      AccessToken: "{{resolve:secretsmanager:serverless-pdf-chat-github-token}}"
      EnvironmentVariables:
        - Name: AMPLIFY_MONOREPO_APP_ROOT
          Value: frontend
        - Name: VITE_REGION
          Value: !Ref AWS::Region
        - Name: VITE_API_ENDPOINT
          Value: !Sub "https://${Api}.execute-api.${AWS::Region}.${AWS::URLSuffix}/dev/"
        - Name: VITE_USER_POOL_ID
          Value: !Ref CognitoUserPool
        - Name: VITE_USER_POOL_CLIENT_ID
          Value: !Ref CognitoUserPoolClient

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Condition: DeployToAmplifyHosting
    Properties:
      BranchName: main
      AppId: !GetAtt AmplifyApp.AppId
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  CognitoUserPool:
    Value: !Ref CognitoUserPool
  CognitoUserPoolClient:
    Value: !Ref CognitoUserPoolClient
  ApiGatewayBaseUrl:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.${AWS::URLSuffix}/dev/"
  DocumentReadyTopicArn:
    Value: !Ref DocumentReadyTopic
  VectorCollectionEndpoint:
    Value: !GetAtt VectorCollection.CollectionEndpoint
